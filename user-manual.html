<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 매뉴얼</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: #0D1117;
      color: #E6EDF3;
    }

    .header {
      position: sticky;
      top: 0;
      background: #161B22;
      padding: 12px;
      border-bottom: 1px solid #30363D;
      z-index: 100;
    }

    .back-btn {
      background: #C8973A;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .container {
      padding: 16px;
    }

    .section {
      margin-bottom: 24px;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #F0C060;
    }

    .desc {
      font-size: 14px;
      color: #8B949E;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- 🔥 상단 고정 뒤로가기 -->
  <div class="header">
    <button class="back-btn" onclick="goBack()">
      ← 앱으로 돌아가기
    </button>
  </div>

  <div class="container">

    <div class="section">
      <div class="title">🙏 기도 탭</div>
      <div class="desc">
        - 기도 시작 버튼으로 시간 측정<br/>
        - 1시간 이상 시 자동 체크<br/>
        - 수정 버튼으로 시간 직접 입력 가능
      </div>
    </div>

    <div class="section">
      <div class="title">📖 통독 탭</div>
      <div class="desc">
        - 읽은 장 체크<br/>
        - 전체 완료 시 자동 완료 처리
      </div>
    </div>

    <div class="section">
      <div class="title">✍️ 암송 탭</div>
      <div class="desc">
        - 암송 완료 체크<br/>
        - 틀린 글자 수 선택
      </div>
    </div>

    <div class="section">
      <div class="title">📤 제출</div>
      <div class="desc">
        - 자동으로 구글폼 연결<br/>
        - 버튼 클릭 시 바로 제출
      </div>
    </div>

  </div>

  <!-- 🔥 뒤로가기 로직 -->
  <script>
    function goBack() {
      // iOS/Android PWA 모두 대응
      if (window.history.length > 1) {
        window.history.back();
      } else {
        // fallback (앱 첫 화면)
        location.href = "/";
      }
    }
  </script>

</body>
</html>
